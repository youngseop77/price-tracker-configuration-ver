<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Insight Pro - Premium Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.85);
            --card-bg: rgba(30, 41, 59, 0.45);
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --price-down: #10b981;
            --price-up: #ef4444;
            --border-glow: rgba(139, 92, 246, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding: 0 32px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--border-glow);
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 0 16px;
        }

        .product-list::-webkit-scrollbar {
            width: 5px;
        }

        .product-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Checkbox styles */
        .sidebar-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 12px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 8px;
        }

        .select-all-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .product-checkbox,
        #selectAllCheckbox {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--glass-border);
        }

        .btn-excel {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-excel:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-1px);
        }

        .product-item {
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
        }

        .product-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .product-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
        }

        .product-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.15));
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .product-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: var(--accent-primary);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-weight: 700;
            font-size: 13px;
            color: #fff;
        }

        .change-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-down {
            background: rgba(16, 185, 129, 0.15);
            color: var(--price-down);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-up {
            background: rgba(239, 68, 68, 0.15);
            color: var(--price-up);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-none {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 48px 64px;
            overflow-y: auto;
            position: relative;
        }

        header {
            margin-bottom: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .seller-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .seller-tag {
            color: var(--accent-secondary);
            font-weight: 800;
            font-size: 13px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent-primary);
            border: none;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .stat-diff {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Chart Filter */
        .chart-filters {
            display: flex;
            gap: 8px;
        }

        .filter-pill {
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-pill.active {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .chart-badge {
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .seller-rank-badge {
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent-primary);
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Certified Stats Grid */
        .certified-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
            padding: 24px;
            background: rgba(139, 92, 246, 0.05);
            /* 약간의 보라색 배경으로 구분 */
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .cert-stat-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Chart Area */
        .chart-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 44px;
            border-radius: 36px;
            margin-bottom: 48px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
        }

        .chart-title {
            font-weight: 800;
            font-size: 20px;
            color: #fff;
        }

        .chart-container {
            height: 420px;
            position: relative;
        }

        /* History */
        .history-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 44px;
        }

        .history-title {
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 28px;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 24px;
            font-size: 15px;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        td:first-child {
            border-left: 1px solid var(--glass-border);
            border-radius: 14px 0 0 14px;
        }

        td:last-child {
            border-right: 1px solid var(--glass-border);
            border-radius: 0 14px 14px 0;
        }

        /* Utils */
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 300px;
            }

            .main-content {
                padding: 40px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            .main-content {
                padding: 32px 20px;
                overflow-y: visible;
                height: auto;
            }

            .chart-section,
            .history-section {
                padding: 24px 16px;
                border-radius: 20px;
                overflow: hidden;
            }

            .chart-container {
                height: 260px;
            }

            .history-section {
                overflow-x: auto;
            }

            table {
                min-width: 480px;
            }

            td,
            th {
                padding: 10px 14px;
                font-size: 13px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">✨</div>
            <div class="logo-text">INSIGHT PRO</div>
        </div>
        <div class="sidebar-toolbar">
            <label class="select-all-label">
                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
                전체선택
            </label>
            <span id="checkedCount" style="font-size:11px;color:var(--text-muted);">0개 선택</span>
        </div>
        <ul class="product-list" id="productList">
            <!-- Loading -->
        </ul>
        <div class="sidebar-footer">
            <button class="btn-excel" onclick="downloadExcel()">📥 선택 상품 엑셀 다운로드</button>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="selectedImageContainer"
                    style="width: 80px; height: 80px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; display: none; align-items: center; justify-content: center;">
                    <img id="selectedImage" src="" alt=""
                        style="max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
                <div class="header-title">
                    <h1 id="selectedTitle">Welcome</h1>
                    <div class="header-subtitle">
                        <div class="seller-info" id="sellerInfo">
                            상품을 선택하여 분석을 시작하세요
                        </div>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="downloadExcel()" class="btn-action"
                    style="background: rgba(16, 185, 129, 0.2); color: #10b981; border-color: rgba(16, 185, 129, 0.3);">
                    <span>📥 엑셀 다운로드</span>
                </button>
                <a href="#" id="catalogBtn" target="_blank" class="btn-action">
                    <span>🛒 카탈로그 바로가기</span>
                </a>
                <!-- <button onclick="refreshData()" id="refreshBtn" class="btn-action btn-primary">
                    <span id="refreshIcon">🔄</span>
                    <span id="refreshText">지금 수집</span>
                </button> -->
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">현재 최저가</div>
                <div class="stat-value" id="currentPriceStat">-</div>
                <div class="stat-diff" id="currentDiff">-</div>
            </div>
            <div class="stat-card" style="border-color: rgba(16, 185, 129, 0.3);">
                <div class="stat-label">역대 최저가</div>
                <div class="stat-value" id="allTimeLow" style="color: var(--price-down);">-</div>
                <div class="stat-diff" id="lowDiff"
                    style="background: rgba(16, 185, 129, 0.1); color: var(--price-down);">BEST</div>
            </div>
            <div class="stat-card" style="border-color: rgba(239, 68, 68, 0.2);">
                <div class="stat-label">역대 최고가</div>
                <div class="stat-value" id="allTimeHigh" style="color: var(--price-up);">-</div>
                <div class="stat-diff" id="highDiff"
                    style="background: rgba(239, 68, 68, 0.1); color: var(--price-up);">PEAK</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">7일 평균</div>
                <div class="stat-value" id="avg7d">-</div>
                <div class="stat-diff" id="avg7dDiff">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">30일 평균</div>
                <div class="stat-value" id="avg30d">-</div>
                <div class="stat-diff" id="avg30dDiff">-</div>
            </div>
        </div>

        <div class="certified-stats-grid" id="certifiedStatsContainer" style="display: none;">
            <div class="stat-card" style="background: rgba(0,0,0,0.2); border: none;">
                <div class="cert-stat-label">인증점 가격</div>
                <div class="stat-value" id="certPrice" style="color: #fff;">-</div>
                <div class="stat-diff" style="background: rgba(255,255,255,0.1); color: var(--text-muted);"
                    id="certRank">-</div>
            </div>
            <div class="stat-card" style="background: rgba(0,0,0,0.2); border: none;" id="certBetweenCard">
                <div class="cert-stat-label">최저가 ~ 인증점 사이 비인증점</div>
                <div class="stat-value" id="certBetweenCount">-</div>
                <div class="stat-diff" id="certBetweenBadge">대표 지표</div>
            </div>
            <div class="stat-card" style="background: rgba(0,0,0,0.2); border: none;">
                <div class="cert-stat-label" style="color: var(--text-muted);">[참고] 인증점보다 싼 전체 비인증점</div>
                <div class="stat-value" id="certCheaperCount" style="color: var(--text-muted);">-</div>
                <div class="stat-diff" style="background: rgba(255,255,255,0.05); color: var(--text-muted);">보조 지표</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">가격 변동 추이</div>
                <div class="chart-filters">
                    <div class="filter-pill" onclick="changeChartDays(7, this)">7일</div>
                    <div class="filter-pill" onclick="changeChartDays(30, this)">30일</div>
                    <div class="filter-pill active" onclick="changeChartDays(90, this)">90일</div>
                    <div class="filter-pill" onclick="changeChartDays(0, this)">전체</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
            <div id="priceBadgeContainer"></div>
        </div>

        <div class="history-section">
            <div class="history-title">시장가 히스토리</div>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>수집 일시</th>
                        <th>판매 가격</th>
                        <th>변동</th>
                        <th>판매처</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let dashboardData = { products: [] };
        let mainChart = null;
        let selectedProductIndex = 0;
        let chartDays = 90; // Default: 90 days

        async function init() {
            try {
                const response = await fetch('dashboard_data.json?v=' + Date.now());
                if (!response.ok) throw new Error("Fetch failed");
                dashboardData = await response.json();

                renderProductList();
                if (dashboardData.products.length > 0) {
                    selectProduct(0);
                }
            } catch (e) {
                console.error("Data load failed", e);
                const list = document.getElementById('productList');
                list.innerHTML = `
                    <div style="padding: 20px; color: var(--price-up); font-size: 13px; line-height: 1.6;">
                        ⚠️ 데이터 로드 실패!<br>
                        로컬 파일을 제약 없이 보려면 아래 명령어로 서버를 실행하세요:<br><br>
                        <code>python -m http.server 8000</code>
                    </div>`;
                alert("대시보드 데이터를 불러오지 못했습니다. 로컬 파일(CORS) 제약 때문일 수 있습니다. Python 서버를 실행하거나, 배포 환경에서 확인해 주세요.");
            }
        }

        function formatPrice(num) {
            if (num === null || num === undefined || num === 0) return '-';
            return new Intl.NumberFormat('ko-KR').format(num) + '원';
        }

        function updateCheckedCount() {
            const count = document.querySelectorAll('.product-checkbox:checked').length;
            document.getElementById('checkedCount').textContent = count + '개 선택';
        }

        function toggleSelectAll(el) {
            document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = el.checked);
            updateCheckedCount();
        }

        function renderProductList() {
            const list = document.getElementById('productList');
            list.innerHTML = dashboardData.products.map((p, index) => {
                const change = p.change_pct ? p.change_pct.toFixed(1) + '%' : '0.0%';
                const badgeClass = p.status === 'PRICE_DOWN' ? 'badge-down' :
                    p.status === 'PRICE_UP' ? 'badge-up' : 'badge-none';
                const trendIcon = p.status === 'PRICE_DOWN' ? '⬇️' : (p.status === 'PRICE_UP' ? '⬆️' : '➖');
                const imgUrl = p.image_url || 'https://via.placeholder.com/40x40?text=?';

                return `
                    <li class="product-item" onclick="selectProduct(${index})">
                        <input type="checkbox" class="product-checkbox" data-index="${index}"
                            onclick="event.stopPropagation(); updateCheckedCount();">
                        <img class="product-thumb" src="${imgUrl}" alt="">
                        <div class="product-info">
                            <span class="product-name">${p.name}</span>
                            <div class="product-meta">
                                <span class="product-price">${formatPrice(p.current_price)}</span>
                                <span class="change-badge ${badgeClass}">${trendIcon} ${change}</span>
                            </div>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function selectProduct(index) {
            selectedProductIndex = index;
            const product = dashboardData.products[index];
            const items = document.querySelectorAll('.product-item');
            items.forEach((item, i) => {
                if (i === index) item.classList.add('active');
                else item.classList.remove('active');
            });

            document.getElementById('selectedTitle').innerText = product.name;

            // Product Image
            const imgEl = document.getElementById('selectedImage');
            const imgContainer = document.getElementById('selectedImageContainer');
            if (product.image_url) {
                imgEl.src = product.image_url;
                imgContainer.style.display = 'flex';
            } else {
                imgEl.src = '';
                imgContainer.style.display = 'none';
            }

            // Seller info + Rank
            let sellerHtml = `<span class="seller-tag">${product.seller}</span>에서 실시간 최저가 수집 중`;
            if (product.certified_rank) {
                sellerHtml += `
                    <div class="seller-rank-badge">
                        🏆 인증점 순위: <b>${product.certified_rank}위</b> / ${product.certified_total}개 업체 중
                    </div>`;
            }
            document.getElementById('sellerInfo').innerHTML = sellerHtml;

            const catalogBtn = document.getElementById('catalogBtn');
            if (product.product_id) {
                catalogBtn.href = `https://search.shopping.naver.com/catalog/${product.product_id}`;
                catalogBtn.style.display = 'flex';
            } else {
                catalogBtn.style.display = 'none';
            }

            // Stats
            document.getElementById('currentPriceStat').innerText = formatPrice(product.current_price);
            document.getElementById('allTimeLow').innerText = formatPrice(product.all_time_low);
            document.getElementById('allTimeHigh').innerText = formatPrice(product.all_time_high);
            document.getElementById('avg7d').innerText = formatPrice(product.avg_7d);
            document.getElementById('avg30d').innerText = formatPrice(product.avg_30d);

            // Diff Calculation
            const setDiff = (id, current, avg) => {
                const el = document.getElementById(id);
                if (!avg) { el.innerText = '-'; return; }
                const diff = current - avg;
                const pct = ((diff / avg) * 100).toFixed(1);
                if (diff < 0) {
                    el.innerText = `평균대비 ${Math.abs(pct)}% 저렴 ✨`;
                    el.style.color = 'var(--price-down)';
                } else if (diff > 0) {
                    el.innerText = `평균대비 ${pct}% 높음`;
                    el.style.color = 'var(--price-up)';
                } else {
                    el.innerText = '평균가와 동일';
                    el.style.color = 'var(--text-muted)';
                }
            };

            setDiff('avg7dDiff', product.current_price, product.avg_7d);
            setDiff('avg30dDiff', product.current_price, product.avg_30d);

            const lastStatus = product.status === 'PRICE_DOWN' ? '최근 하락세 감지 ✅' : (product.status === 'PRICE_UP' ? '가격 상승중 주의 ⚠️' : '현재가 유지 중');
            document.getElementById('currentDiff').innerText = lastStatus;

            // Certified Stats Rendering
            const certContainer = document.getElementById('certifiedStatsContainer');
            if (product.certified_price !== null && product.certified_price !== undefined) {
                certContainer.style.display = 'grid';
                document.getElementById('certPrice').innerText = formatPrice(product.certified_price);

                // 순위 표시
                const rankText = product.certified_rank ? `${product.certified_rank}위 / ${product.certified_total}개(전체)` : '-';
                document.getElementById('certRank').innerText = rankText;

                // 대표 지표: Between Count
                const bCount = product.certified_between_count;
                const bEl = document.getElementById('certBetweenCount');
                const bBadge = document.getElementById('certBetweenBadge');
                const bCard = document.getElementById('certBetweenCard');

                if (bCount !== null && bCount !== undefined) {
                    bEl.innerText = `${bCount}개 업체`;
                    if (bCount === 0) {
                        bEl.style.color = 'var(--price-down)';
                        bBadge.style.color = 'var(--price-down)';
                        bBadge.style.background = 'rgba(16, 185, 129, 0.1)';
                        bBadge.innerText = '안정 (인증점 최저수준)';
                        bCard.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.2)';
                    } else if (bCount <= 2) {
                        bEl.style.color = '#f59e0b'; // 주황
                        bBadge.style.color = '#f59e0b';
                        bBadge.style.background = 'rgba(245, 158, 11, 0.1)';
                        bBadge.innerText = '주의 요망';
                        bCard.style.boxShadow = '0 0 15px rgba(245, 158, 11, 0.2)';
                    } else {
                        bEl.style.color = 'var(--price-up)'; // 빨강
                        bBadge.style.color = 'var(--price-up)';
                        bBadge.style.background = 'rgba(239, 68, 68, 0.1)';
                        bBadge.innerText = '경고 (비인증점 과다)';
                        bCard.style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.3)';
                    }
                } else {
                    bEl.innerText = '-';
                    bEl.style.color = '#fff';
                    bBadge.innerText = '-';
                    bCard.style.boxShadow = 'none';
                }

                // 보조 지표: Cheaper Count
                const cCount = product.certified_cheaper_count;
                document.getElementById('certCheaperCount').innerText = (cCount !== null && cCount !== undefined) ? `${cCount}개 업체` : '-';

            } else {
                certContainer.style.display = 'none';
            }

            // All-time low badge
            const badgeContainer = document.getElementById('priceBadgeContainer');
            if (product.current_price <= product.all_time_low && product.all_time_low > 0) {
                badgeContainer.innerHTML = `<div class="chart-badge" style="background: rgba(16, 185, 129, 0.1); color: var(--price-down); border-color: rgba(16, 185, 129, 0.2);">✨ 현재 역대 최저가 달성 중!</div>`;
            } else {
                const diffFromLow = product.current_price - product.all_time_low;
                const pctFromLow = ((diffFromLow / product.all_time_low) * 100).toFixed(1);
                badgeContainer.innerHTML = `<div class="chart-badge">역대 최저가 대비 +${pctFromLow}% 높음</div>`;
            }

            refreshChartView();
            renderTable(product);
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const text = document.getElementById('refreshText');

            try {
                btn.disabled = true;
                icon.classList.add('spin');
                text.innerText = '수집 중...';

                const res = await fetch('/collect', { method: 'POST' });
                if (res.ok) {
                    // Refresh current page after short delay to show result
                    text.innerText = '수집 완료! 새로고침 중...';
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    throw new Error("Collect failed");
                }
            } catch (e) {
                alert("수집 실패: " + e.message);
                btn.disabled = false;
                icon.classList.remove('spin');
                text.innerText = '지금 수집';
            }
        }

        function changeChartDays(days, el) {
            chartDays = days;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            refreshChartView();
        }

        function refreshChartView() {
            const product = dashboardData.products[selectedProductIndex];
            let history = product.history;

            if (chartDays > 0) {
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - chartDays);
                history = history.filter(h => new Date(h.t) >= cutoff);
            }

            renderChart(history);
        }

        function downloadExcel() {
            const checked = document.querySelectorAll('.product-checkbox:checked');
            if (checked.length === 0) {
                alert("체크박스로 다운로드할 상품을 선택하세요.");
                return;
            }

            const indices = Array.from(checked).map(cb => parseInt(cb.dataset.index));
            const products = indices.map(i => dashboardData.products[i]);

            let csvContent = "\uFEFF상품명,수집 일시,판매 가격(원),판매처,변동\n";

            products.forEach(product => {
                const hist = product.history.slice();
                hist.forEach((h, i) => {
                    const date = new Date(h.t);
                    const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                    const name = `"${product.name.replace(/"/g, '""')}"`;
                    const seller = `"${(product.seller || '').replace(/"/g, '""')}"`;

                    let diff = 0;
                    if (i > 0) diff = h.p - hist[i - 1].p;

                    csvContent += `${name},${dateStr},${h.p},${seller},${diff}\n`;
                });
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.setAttribute('href', URL.createObjectURL(blob));
            link.setAttribute('download', `가격이력_${products.length}개_${Date.now()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderChart(history) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (mainChart) mainChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
            gradient.addColorStop(1, 'rgba(139, 92, 246, 0)');

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => {
                        const d = new Date(h.t);
                        return `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:00`;
                    }),
                    datasets: [{
                        label: '최저가',
                        data: history.map(h => h.p),
                        borderColor: '#8b5cf6',
                        borderWidth: 3,
                        pointBackgroundColor: '#8b5cf6',
                        pointBorderColor: 'rgba(255,255,255,0.2)',
                        pointHoverRadius: 6,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            padding: 12,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: (ctx) => ` 가격: ${formatPrice(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 11 },
                                callback: (v) => v.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        function renderTable(product) {
            const tbody = document.querySelector('#historyTable tbody');
            const history = product.history.slice().reverse(); // 최신순

            tbody.innerHTML = history.map((h, i) => {
                const date = new Date(h.t);
                const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;

                // 변동 계산 (다음 항목과의 차이)
                let diffStr = '-';
                let diffColor = 'var(--text-muted)';
                if (i < history.length - 1) {
                    const prevPrice = history[i + 1].p;
                    const diff = h.p - prevPrice;
                    if (diff < 0) {
                        diffStr = `⬇️ ${Math.abs(diff).toLocaleString()}`;
                        diffColor = 'var(--price-down)';
                    } else if (diff > 0) {
                        diffStr = `⬆️ ${diff.toLocaleString()}`;
                        diffColor = 'var(--price-up)';
                    } else {
                        diffStr = '0';
                    }
                }

                return `
                    <tr>
                        <td style="font-size: 12px; color: var(--text-muted)">${dateStr}</td>
                        <td style="font-weight: 700">${formatPrice(h.p)}</td>
                        <td style="color: ${diffColor}; font-weight: 600; font-size: 12px;">${diffStr}</td>
                        <td style="font-size: 13px">${product.seller}</td>
                        <td><span class="status-indicator active"></span>정상</td>
                    </tr>
                `;
            }).join('');
        }

        init();
    </script>
</body>

</html>
