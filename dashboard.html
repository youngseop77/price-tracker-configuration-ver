<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Insight Pro - Premium Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.85);
            --card-bg: rgba(30, 41, 59, 0.45);
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --price-down: #10b981;
            --price-up: #ef4444;
            --border-glow: rgba(139, 92, 246, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding: 0 32px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--border-glow);
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 0 16px;
        }

        .product-list::-webkit-scrollbar {
            width: 5px;
        }

        .product-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .product-item {
            padding: 20px 24px;
            border-radius: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .product-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
        }

        .product-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.15));
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .product-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: var(--accent-primary);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .product-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-weight: 700;
            font-size: 17px;
            color: #fff;
        }

        .change-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-down {
            background: rgba(16, 185, 129, 0.15);
            color: var(--price-down);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-up {
            background: rgba(239, 68, 68, 0.15);
            color: var(--price-up);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-none {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 48px 64px;
            overflow-y: auto;
            position: relative;
        }

        header {
            margin-bottom: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .seller-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .seller-tag {
            color: var(--accent-secondary);
            font-weight: 800;
            font-size: 13px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent-primary);
            border: none;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 28px;
            transition: all 0.4s;
            position: relative;
        }

        .stat-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: scale(1.02);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .stat-diff {
            font-size: 12px;
            margin-top: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Chart Area */
        .chart-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 44px;
            border-radius: 36px;
            margin-bottom: 48px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
        }

        .chart-title {
            font-weight: 800;
            font-size: 20px;
            color: #fff;
        }

        .chart-container {
            height: 420px;
            position: relative;
        }

        /* History */
        .history-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 44px;
        }

        .history-title {
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 28px;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 24px;
            font-size: 15px;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        td:first-child {
            border-left: 1px solid var(--glass-border);
            border-radius: 14px 0 0 14px;
        }

        td:last-child {
            border-right: 1px solid var(--glass-border);
            border-radius: 0 14px 14px 0;
        }

        /* Utils */
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 300px;
            }

            .main-content {
                padding: 40px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            .main-content {
                padding: 32px 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">✨</div>
            <div class="logo-text">INSIGHT PRO</div>
        </div>
        <ul class="product-list" id="productList">
            <!-- Loading -->
        </ul>
    </div>

    <div class="main-content">
        <header>
            <div class="header-title">
                <h1 id="selectedTitle">Welcome</h1>
                <div class="header-subtitle">
                    <div class="seller-info" id="sellerInfo">
                        상품을 선택하여 분석을 시작하세요
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="downloadExcel()" class="btn-action"
                    style="background: rgba(16, 185, 129, 0.2); color: #10b981; border-color: rgba(16, 185, 129, 0.3);">
                    <span>📥 엑셀 다운로드</span>
                </button>
                <a href="#" id="catalogBtn" target="_blank" class="btn-action">
                    <span>🛒 카탈로그 바로가기</span>
                </a>
                <!-- <button onclick="refreshData()" id="refreshBtn" class="btn-action btn-primary">
                    <span id="refreshIcon">🔄</span>
                    <span id="refreshText">지금 수집</span>
                </button> -->
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">현재 최저가</div>
                <div class="stat-value" id="currentPriceStat">-</div>
                <div class="stat-diff" id="currentDiff">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">7일 평균</div>
                <div class="stat-value" id="avg7d">-</div>
                <div class="stat-diff" id="avg7dDiff">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">30일 평균</div>
                <div class="stat-value" id="avg30d">-</div>
                <div class="stat-diff" id="avg30dDiff">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">90일 평균</div>
                <div class="stat-value" id="avg90d">-</div>
                <div class="stat-diff" id="avg90dDiff">-</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">가격 변동 추이</div>
                <div style="font-size: 12px; color: var(--text-muted); font-weight: 600;">최근 90일 데이터 분석</div>
            </div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">수집 타임라인</div>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>수집 일시</th>
                        <th>판매 가격</th>
                        <th>판매처</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let dashboardData = { products: [] };
        let mainChart = null;

        async function init() {
            try {
                // 항상 dashboard_data.json에서 최신 데이터 로드 (injectedData 방식 제거 - 매번 갱신 보장)
                const response = await fetch('dashboard_data.json?v=' + Date.now());
                dashboardData = await response.json();

                renderProductList();
                if (dashboardData.products.length > 0) {
                    selectProduct(0);
                }
            } catch (e) {
                console.error("Data load failed", e);
                // Fallback UI or empty state
            }
        }

        function formatPrice(num) {
            if (num === null || num === undefined) return '-';
            return new Intl.NumberFormat('ko-KR').format(num) + '원';
        }

        function renderProductList() {
            const list = document.getElementById('productList');
            list.innerHTML = dashboardData.products.map((p, index) => {
                const change = p.change_pct ? p.change_pct.toFixed(1) + '%' : '0.0%';
                const badgeClass = p.status === 'PRICE_DOWN' ? 'badge-down' :
                    p.status === 'PRICE_UP' ? 'badge-up' : 'badge-none';
                const trendIcon = p.status === 'PRICE_DOWN' ? '⬇️' : (p.status === 'PRICE_UP' ? '⬆️' : '➖');

                return `
                    <li class="product-item" onclick="selectProduct(${index})">
                        <span class="product-name">${p.name}</span>
                        <div class="product-meta">
                            <span class="product-price">${formatPrice(p.current_price)}</span>
                            <span class="change-badge ${badgeClass}">${trendIcon} ${change}</span>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function selectProduct(index) {
            const product = dashboardData.products[index];
            const items = document.querySelectorAll('.product-item');
            items.forEach((item, i) => {
                if (i === index) item.classList.add('active');
                else item.classList.remove('active');
            });

            // Update UI
            document.getElementById('selectedTitle').innerText = product.name;
            document.getElementById('sellerInfo').innerHTML = `<span class="seller-tag">${product.seller}</span>에서 실시간 최저가 수집 중`;

            // Catalog Link
            const catalogBtn = document.getElementById('catalogBtn');
            if (product.product_id) {
                catalogBtn.href = `https://search.shopping.naver.com/catalog/${product.product_id}`;
                catalogBtn.style.display = 'flex';
            } else {
                catalogBtn.style.display = 'none';
            }

            // Stats
            document.getElementById('currentPriceStat').innerText = formatPrice(product.current_price);
            document.getElementById('avg7d').innerText = formatPrice(product.avg_7d);
            document.getElementById('avg30d').innerText = formatPrice(product.avg_30d);
            document.getElementById('avg90d').innerText = formatPrice(product.avg_90d);

            const setDiff = (id, current, avg) => {
                const el = document.getElementById(id);
                if (!avg) { el.innerText = '-'; return; }
                const diff = current - avg;
                const pct = ((diff / avg) * 100).toFixed(1);
                if (diff < 0) {
                    el.innerText = `평균대비 ${Math.abs(pct)}% 저렴 ✨`;
                    el.style.color = 'var(--price-down)';
                } else if (diff > 0) {
                    el.innerText = `평균대비 ${pct}% 높음`;
                    el.style.color = 'var(--price-up)';
                } else {
                    el.innerText = '평균가와 동일';
                    el.style.color = 'var(--text-muted)';
                }
            };

            setDiff('avg7dDiff', product.current_price, product.avg_7d);
            setDiff('avg30dDiff', product.current_price, product.avg_30d);
            setDiff('avg90dDiff', product.current_price, product.avg_90d);

            const lastStatus = product.status === 'PRICE_DOWN' ? '최근 하락세 감지 ✅' : (product.status === 'PRICE_UP' ? '가격 상승중 주의 ⚠️' : '현재가 유지 중');
            document.getElementById('currentDiff').innerText = lastStatus;

            renderChart(product.history);
            renderTable(product);
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const text = document.getElementById('refreshText');

            try {
                btn.disabled = true;
                icon.classList.add('spin');
                text.innerText = '수집 중...';

                const res = await fetch('/collect', { method: 'POST' });
                if (res.ok) {
                    // Refresh current page after short delay to show result
                    text.innerText = '수집 완료! 새로고침 중...';
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    throw new Error("Collect failed");
                }
            } catch (e) {
                alert("수집 실패: " + e.message);
                btn.disabled = false;
                icon.classList.remove('spin');
                text.innerText = '지금 수집';
            }
        }

        function downloadExcel() {
            const product = dashboardData.products.find(p => p.name === document.getElementById('selectedTitle').innerText);
            if (!product || !product.history || product.history.length === 0) {
                alert("다운로드할 데이터가 없습니다.");
                return;
            }

            // CSV 헤더
            let csvContent = "\uFEFF수집 일시,판매 가격,판매처,상태\n"; // \uFEFF for Excel UTF-8 BOM

            product.history.slice().reverse().forEach(h => {
                const date = new Date(h.t);
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;

                // CSV 행 추가 (이스케이프 처리 포함)
                const price = h.p;
                const seller = `"${product.seller.replace(/"/g, '""')}"`;
                const status = "SUCCESS";

                csvContent += `${dateStr},${price},${seller},${status}\n`;
            });

            // Blob 생성 및 다운로드 트리거
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);

            link.setAttribute("href", url);
            link.setAttribute("download", `${product.name}_가격이력_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderChart(history) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (mainChart) mainChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
            gradient.addColorStop(1, 'rgba(139, 92, 246, 0)');

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => {
                        const d = new Date(h.t);
                        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
                    }),
                    datasets: [{
                        data: history.map(h => h.p),
                        borderColor: '#8b5cf6',
                        borderWidth: 5,
                        pointRadius: 0,
                        pointHoverRadius: 8,
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#8b5cf6',
                        pointHoverBorderWidth: 4,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 12, weight: '600' },
                                callback: value => value.toLocaleString() + '원'
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#64748b',
                                font: { size: 10, weight: '500' },
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 10
                            }
                        }
                    }
                }
            });
        }

        function renderTable(product) {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = product.history.slice().reverse().slice(0, 20).map(h => {
                const date = new Date(h.t);
                const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                return `
                <tr>
                    <td style="color: var(--text-muted); font-weight: 500;">${dateStr}</td>
                    <td style="font-weight:700; color: #fff;">${formatPrice(h.p)}</td>
                    <td><span class="seller-tag" style="background:rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 4px 10px; border-radius: 8px;">${product.seller}</span></td>
                    <td><span class="change-badge badge-none">SUCCESS</span></td>
                </tr>
            `}).join('');
        }

        init();
    </script>
</body>

</html>
