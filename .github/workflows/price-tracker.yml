name: Naver Price Tracker (Automated)

on:
  schedule:
    - cron: '0 * * * *'  # Every hour on the hour
  workflow_dispatch:      # Manual trigger from GitHub UI (Refresh Now)
  push:
    branches: [ main ]    # Run on every push to main

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To allow pushing updates if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Price Tracker
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PYTHONPATH: src
        run: |
           # 1. Sync DB from GCS
           python -m tracker.main sync-from-gcs || echo "First run or GCS unavailable, starting fresh"
           
           # Show DB record count before collection
           python -c "
           import sqlite3, os
           db = './price_tracker.sqlite3'
           if os.path.exists(db):
               conn = sqlite3.connect(db)
               count = conn.execute('SELECT COUNT(*) FROM observations').fetchone()[0]
               latest = conn.execute('SELECT MAX(collected_at) FROM observations').fetchone()[0]
               print(f'DB records before: {count}, latest: {latest}')
               conn.close()
           else:
               print('No DB found, starting fresh')
           "
           
           # 2. Collect Prices
           python -m tracker.main once --summary-json summary.json || echo "Some items failed, continuing with partial results"
           
           if [ -f "summary.json" ]; then
             echo "### 📊 Collection Summary" >> $GITHUB_STEP_SUMMARY
             echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
             cat summary.json >> $GITHUB_STEP_SUMMARY
             echo "" >> $GITHUB_STEP_SUMMARY
             echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
           fi
           
           # Show DB record count after collection
           python -c "
           import sqlite3
           conn = sqlite3.connect('./price_tracker.sqlite3')
           count = conn.execute('SELECT COUNT(*) FROM observations').fetchone()[0]
           latest = conn.execute('SELECT MAX(collected_at) FROM observations').fetchone()[0]
           print(f'DB records after collect: {count}, latest: {latest}')
           conn.close()
           "
           
           # 3. Export Dashboard UI
           python -m tracker.main export-ui
           
           # Prepare public directory for GitHub Pages
           mkdir -p public
           cp dashboard.html public/index.html
           cp dashboard_data.json public/
           
           # 4. Sync Result back to GCS
           python -m tracker.main sync-to-gcs && echo "GCS sync SUCCESS" || echo "GCS sync FAILED (non-fatal)"

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: artifacts/
          retention-days: 3

      - name: Upload Dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Only expose the public assets

  deploy:
    needs: track
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
