name: 상품 추가 (Add Product)

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: '상품명 (예: 애플 맥북 에어 M3)'
        required: true
        type: string
      product_id:
        description: '네이버 카탈로그 ID (상품 URL에서 확인, 예: 53529682032)'
        required: true
        type: string
      query:
        description: '검색 쿼리 (예: 맥북 에어 M3 MRXN3KH/A)'
        required: true
        type: string
      required_keywords:
        description: '필수 키워드 (쉼표로 구분, 예: 맥북,M3). 비워두면 상품명에서 자동 추출'
        required: false
        type: string

jobs:
  add-product:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add product to targets.yaml
        run: |
          python -c "
          import yaml, sys

          name = '${{ github.event.inputs.product_name }}'
          product_id = '${{ github.event.inputs.product_id }}'
          query = '${{ github.event.inputs.query }}'
          raw_keywords = '${{ github.event.inputs.required_keywords }}'

          # 필수 키워드 파싱 (입력 없으면 상품명에서 자동 추출)
          if raw_keywords.strip():
              keywords = [k.strip() for k in raw_keywords.split(',') if k.strip()]
          else:
              keywords = [w for w in name.split() if len(w) > 1][:3]

          with open('targets.yaml', 'r', encoding='utf-8') as f:
              config = yaml.safe_load(f)

          # 중복 체크
          existing_names = [t.get('name') for t in config.get('targets', [])]
          if name in existing_names:
              print(f'이미 등록된 상품: {name}')
              sys.exit(0)

          new_target = {
              'name': name,
              'mode': 'api_query',
              'query': query,
              'fallback_url': None,
              'match': {
                  'required_keywords': keywords,
                  'exclude_keywords': ['중고', '리퍼', '케이스', '필름'],
                  'product_id': product_id,
                  'allowed_product_types': [1, 3],
              },
              'request': {'pages': 1, 'sort': 'asc', 'filter': None},
          }

          config['targets'].append(new_target)

          with open('targets.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(config, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          print(f'상품 추가 완료: {name} (ID: {product_id})')
          "

      - name: Commit updated targets.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add targets.yaml
          git diff --staged --quiet || git commit -m "Add product: ${{ github.event.inputs.product_name }}"
          git push origin main

      - name: Trigger price collection
        run: |
          echo "상품 추가 완료! 다음 정각에 가격이 자동 수집됩니다."
          echo "즉시 수집을 원하면 'Naver Price Tracker' 워크플로우를 수동 실행하세요."
