common:
  exclude: "used:cbshop"
  display: 100
  timeout_seconds: 20
  alert_threshold_percent: 5.0

targets:
  - name: "애플 에어팟 프로 2세대"
    mode: "api_query"
    query: "에어팟 프로 2세대"
    fallback_url: "https://search.shopping.naver.com/catalog/35161048618"
    match:
      required_keywords: ["에어팟", "프로"]
      exclude_keywords: ["중고", "리퍼", "해외", "케이스", "커버", "필름", "파우치", "이어팁", "호환", "스트랩"]
      allowed_product_types: [1, 3]
    request:
      pages: 1
      sort: "asc"

  - name: "삼성 갤럭시 버즈3 프로"
    mode: "api_query"
    query: "갤럭시 버즈3 프로"
    fallback_url: "https://search.shopping.naver.com/catalog/48590675618"
    match:
      required_keywords: ["버즈3", "프로"]
      exclude_keywords: ["중고", "케이스", "커버", "필름", "파우치", "이어팁", "호환", "부품", "스트랩", "거치대", "스탠드", "충전기", "케이블"]
    request:
      pages: 1
      sort: "asc"
